name: Publish Ghostscript Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Ghostscript version to publish, or all"
        required: true
        default: "9.50"

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Select versions
        id: versions
        shell: bash
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ "$VERSION_INPUT" = "all" ]; then
            mapfile -t versions < <(find versions -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -V)
          else
            if [ ! -f "versions/$VERSION_INPUT/Dockerfile" ]; then
              echo "::error::Unknown Ghostscript version: $VERSION_INPUT"
              exit 1
            fi
            versions=("$VERSION_INPUT")
          fi

          json="["
          for version in "${versions[@]}"; do
            json="${json}\"$version\","
          done
          json="${json%,}]"

          echo "matrix={\"version\":$json}" >> "$GITHUB_OUTPUT"

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      REGISTRY: ghcr.io
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build, verify, and publish
        shell: bash
        env:
          VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"

          echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "$GITHUB_ACTOR" --password-stdin

          local_image="gs-$VERSION"
          remote_image="$REGISTRY/$owner/$local_image:latest"
          debug_image="$local_image:debug"
          remote_debug_image="$REGISTRY/$owner/$local_image:debug"
          combined_image="$local_image:combined"
          remote_combined_image="$REGISTRY/$owner/$local_image:combined"

          echo "::group::Build $local_image"
          docker build \
            --label "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
            --label "org.opencontainers.image.description=Ghostscript $VERSION container" \
            -t "$local_image" \
            "versions/$VERSION"
          echo "::endgroup::"

          expected_version="$VERSION"
          case "$VERSION" in
            10.0.0)
              expected_version="10.00.0"
              ;;
          esac

          actual_version="$(docker run --rm "$local_image" --version)"
          if [ "$actual_version" != "$expected_version" ]; then
            echo "::error::$local_image reported version $actual_version, expected $expected_version"
            exit 1
          fi

          platform_arch="$(docker image inspect "$local_image" --format '{{ .Architecture }}')"
          if [ "$platform_arch" != "amd64" ]; then
            echo "::error::$local_image platform architecture is $platform_arch, expected amd64"
            exit 1
          fi

          oci_arch="$(docker image inspect "$local_image" --format '{{ index .Config.Labels "org.opencontainers.image.architecture" }}')"
          if [ "$oci_arch" != "amd64" ]; then
            echo "::error::$local_image OCI architecture label is $oci_arch, expected amd64"
            exit 1
          fi

          gs_cpu_arch="$(docker image inspect "$local_image" --format '{{ index .Config.Labels "net.w0ot.ghostscript.cpu-architecture" }}')"
          if [ "$gs_cpu_arch" != "x86_64" ]; then
            echo "::error::$local_image Ghostscript CPU architecture label is $gs_cpu_arch, expected x86_64"
            exit 1
          fi

          echo "::group::Build $debug_image"
          scripts/build-debug-image "$VERSION" "$debug_image"
          echo "::endgroup::"

          debug_actual_version="$(docker run --rm "$debug_image" --version)"
          if [ "$debug_actual_version" != "$expected_version" ]; then
            echo "::error::$debug_image reported version $debug_actual_version, expected $expected_version"
            exit 1
          fi

          debug_platform_arch="$(docker image inspect "$debug_image" --format '{{ .Architecture }}')"
          if [ "$debug_platform_arch" != "amd64" ]; then
            echo "::error::$debug_image platform architecture is $debug_platform_arch, expected amd64"
            exit 1
          fi

          debug_oci_arch="$(docker image inspect "$debug_image" --format '{{ index .Config.Labels "org.opencontainers.image.architecture" }}')"
          if [ "$debug_oci_arch" != "amd64" ]; then
            echo "::error::$debug_image OCI architecture label is $debug_oci_arch, expected amd64"
            exit 1
          fi

          debug_gs_cpu_arch="$(docker image inspect "$debug_image" --format '{{ index .Config.Labels "net.w0ot.ghostscript.cpu-architecture" }}')"
          if [ "$debug_gs_cpu_arch" != "x86_64" ]; then
            echo "::error::$debug_image Ghostscript CPU architecture label is $debug_gs_cpu_arch, expected x86_64"
            exit 1
          fi

          debug_flavor="$(docker image inspect "$debug_image" --format '{{ index .Config.Labels "net.w0ot.ghostscript.build-flavor" }}')"
          if [ "$debug_flavor" != "debug" ]; then
            echo "::error::$debug_image build flavor label is $debug_flavor, expected debug"
            exit 1
          fi

          if ! docker run --rm --entrypoint sh "$debug_image" -c 'readelf -S "$(command -v gs)" | grep -q "\.debug_info"'; then
            echo "::error::$debug_image does not contain a .debug_info section in the gs executable"
            exit 1
          fi

          echo "::group::Build $combined_image"
          scripts/build-combined-image "$VERSION" "$combined_image"
          echo "::endgroup::"

          combined_actual_version="$(docker run --rm "$combined_image" --version)"
          if [ "$combined_actual_version" != "$expected_version" ]; then
            echo "::error::$combined_image gs reported version $combined_actual_version, expected $expected_version"
            exit 1
          fi

          combined_debug_actual_version="$(docker run --rm --entrypoint gs-debug "$combined_image" --version)"
          if [ "$combined_debug_actual_version" != "$expected_version" ]; then
            echo "::error::$combined_image gs-debug reported version $combined_debug_actual_version, expected $expected_version"
            exit 1
          fi

          combined_platform_arch="$(docker image inspect "$combined_image" --format '{{ .Architecture }}')"
          if [ "$combined_platform_arch" != "amd64" ]; then
            echo "::error::$combined_image platform architecture is $combined_platform_arch, expected amd64"
            exit 1
          fi

          combined_oci_arch="$(docker image inspect "$combined_image" --format '{{ index .Config.Labels "org.opencontainers.image.architecture" }}')"
          if [ "$combined_oci_arch" != "amd64" ]; then
            echo "::error::$combined_image OCI architecture label is $combined_oci_arch, expected amd64"
            exit 1
          fi

          combined_gs_cpu_arch="$(docker image inspect "$combined_image" --format '{{ index .Config.Labels "net.w0ot.ghostscript.cpu-architecture" }}')"
          if [ "$combined_gs_cpu_arch" != "x86_64" ]; then
            echo "::error::$combined_image Ghostscript CPU architecture label is $combined_gs_cpu_arch, expected x86_64"
            exit 1
          fi

          combined_flavor="$(docker image inspect "$combined_image" --format '{{ index .Config.Labels "net.w0ot.ghostscript.build-flavor" }}')"
          if [ "$combined_flavor" != "combined" ]; then
            echo "::error::$combined_image build flavor label is $combined_flavor, expected combined"
            exit 1
          fi

          if ! docker run --rm --entrypoint sh "$combined_image" -c 'readelf -S "$(command -v gs-debug)" | grep -q "\.debug_info"'; then
            echo "::error::$combined_image does not contain a .debug_info section in the gs-debug executable"
            exit 1
          fi

          docker tag "$local_image" "$remote_image"
          docker tag "$debug_image" "$remote_debug_image"
          docker tag "$combined_image" "$remote_combined_image"
          docker push "$remote_image"
          docker push "$remote_debug_image"
          docker push "$remote_combined_image"
